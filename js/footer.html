<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Select all blog articles
    var blogItems = document.querySelectorAll('.blog-basic-grid--container');

    blogItems.forEach(function(item) {
      // Find the image link and title link
      var imageLink = item.querySelector('.image-wrapper');
      var titleLink = item.querySelector('.blog-title a');
      
      if (imageLink && titleLink) {
        // Set the title link to match the image link's URL
        imageLink.href = titleLink.href;
        // Remove the target="_blank" attribute to prevent opening in a new tab
        titleLink.removeAttribute('target');
      }
    });
  });
</script>
<script src="https://assets.squarewebsites.org/numbered-pagination/pagination.min.js"></script>

            '.blog-list,.BlogList,  .view-list .page-section[class*="collection-type-blog-"] div[data-controller],.article-list': { // classnames of containers where we want to have a pagination

                backgroundColor: 'transparent',
                margin: '3% 0',
		align: 'center', // align pagination
                padding: '0',

</script>
